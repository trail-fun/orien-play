<div id="map"></div>

<script>
  /********************
   * 設定
   ********************/
  const CENTER_LAT = 34.4;
  const CENTER_LNG = 132.4;
  const ZOOM_LEVEL = 12;

  const DATA_URL = "crew_locations.json";
  const REFRESH_INTERVAL = 60000; // 1分（ミリ秒）

   /********************
   * 地図初期化
   ********************/
  const map = L.map("map").setView(
    [CENTER_LAT, CENTER_LNG],
    ZOOM_LEVEL
  );

  // 国土地理院地図
  L.tileLayer(
    "https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png",
    {
      attribution: "地図情報 © 国土地理院"
    }
  ).addTo(map);

  async function loadMarkers() {
  const response = await fetch("https://script.google.com/macros/s/AKfycbyZm-IIzgbk8KaX12tBHtgcX4w7cejKdR1SQZgukdC6Zl5M5e3N-DbVX5epVlzvgw/exec");
  const locations = await response.json();
  
  locations.forEach(loc => {
    // L.marker ではなく L.circleMarker を使用
    L.circleMarker([loc.lat, loc.lng], {
      radius: 12,           // ⭕️の大きさ
      color: '#ff4500',     // 枠線の色（オレンジレッドなど）
      weight: 3,            // 枠線の太さ
      opacity: 0.8,         // 枠線の透明度
      fillColor: '#ff4500', // 中の色
      fillOpacity: 0//0.2      // 中の透明度（ここを下げると「透明な⭕️」に見えます）
    })
    .addTo(map)
    .bindPopup(`${loc.name}<br>${loc.time}`);
  });
}  
  /********************
   * 初回読み込み & 自動更新
   ********************/
  loadMarkers();                         // ページ表示時
  setInterval(loadMarkers, REFRESH_INTERVAL); // 定期更新

</script>
