const runners = ['mik_shiraishi.gpx'];//, 'runner2.gpx', 'runner3.gpx'];

// 各GPXのパース処理をPromise化する関数
const loadGpxAsTrack = (file) => {
    return new Promise((resolve) => {
        new L.GPX(`./gpxdata/${file}`, { async: true })
        .on('loaded', function(e) {
            const trackPoints = e.element.getElementsByTagName('trkpt');
            const points = [];

            for (let i = 0; i < trackPoints.length; i++) {
                const pt = trackPoints[i];
                const timeStr = pt.getElementsByTagName("time")[0]?.textContent;
                
                points.push({
                    lat: parseFloat(pt.getAttribute("lat")),
                    lng: parseFloat(pt.getAttribute("lon")), // trackplayback用にlngとする
                    time: timeStr ? Math.floor(new Date(timeStr).getTime() / 1000) : 0
                });
            }
            resolve(points); // このGPXの全ポイントを返す
console.log("points:",points);
        })
        .addTo(map);
    });
};

    // get data from server
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'examples/data/test.json', true);
    xhr.onreadystatechange = xhrCallback;
    xhr.send();

    function xhrCallback() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        const trackplayback = L.trackplayback(data, map, {
          targetOptions: {
            useImg: true,
            imgUrl: 'examples/ship.png'
          }
        });
        const trackplaybackControl = L.trackplaybackcontrol(trackplayback);
        trackplaybackControl.addTo(map);
