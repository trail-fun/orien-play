    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリエンテーリング</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet.GPX CSS（必要な場合） -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-gpx@2.1.1/dist/leaflet-gpx.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
        }
        
        /* 地図コンテナは100%の高さが必須 */
        #map {
            width: 100%;
            height: 100vh; /* ビューポート全体を使用 */
        }
    </style>

</head>
<body>
    <div id="map" style="height: 100vh;"></div>
/*
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

*/
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet.GPX JS -->
    <script src="https://unpkg.com/leaflet-gpx@2.1.1/dist/leaflet-gpx.js"></script>
    

    <script src="script.js"></script>
</body>
